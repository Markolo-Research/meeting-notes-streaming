name: actions-hygiene

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MARKOLO_SHARED_STANDARDS_REF: standards/stable
  PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

jobs:
  actions-hygiene:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ fromJSON(vars.MARKOLO_CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          prune-cache: false

      - name: Load shared repo standards
        if: ${{ env.PACKAGES_TOKEN != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: Markolo-Research/markolo-shared
          ref: ${{ env.MARKOLO_SHARED_STANDARDS_REF }}
          path: .repo-standards/markolo-shared
          token: ${{ env.PACKAGES_TOKEN }}
          persist-credentials: false

      - name: Set shared repo standards path
        if: ${{ env.PACKAGES_TOKEN != '' }}
        run: echo "REPO_STANDARDS_LOCAL=$GITHUB_WORKSPACE/.repo-standards/markolo-shared" >> "$GITHUB_ENV"

      - name: Run actions hygiene
        run: scripts/guards/_repo-standards actions-hygiene
