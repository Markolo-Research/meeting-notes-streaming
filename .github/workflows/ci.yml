name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel any in-progress run on the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: UV_NO_EXCLUDE_NEWER=1 uv python install 3.12

      - name: Lint (ruff)
        # Deliberately avoiding project sync: the default deps include
        # openai-whisper, which transitively installs torch.
        run: |
          UV_NO_EXCLUDE_NEWER=1 uv run --no-project --python 3.12 \
            --with ruff \
            ruff check meeting_notes/ tests/

      - name: Test (pytest, fast tests only)
        # Explicitly listing the test files keeps CI green even if someone
        # later adds a new test file with heavy dependencies.
        run: |
          UV_NO_EXCLUDE_NEWER=1 uv run --no-project --python 3.12 \
            --with pyyaml \
            --with openai \
            --with anthropic \
            --with openrouter \
            --with pytest \
            --with pytest-asyncio \
            -m pytest -v \
            tests/test_config.py \
            tests/test_paths_and_fallbacks.py \
            tests/test_recording_retention.py \
            tests/test_summarizers.py
